# =============================================================================
# TTRPG OCR Console — Portainer Stack
# =============================================================================
#
# Prerequisites
# ─────────────
# This stack joins the external "supabase_net" Docker network, which is
# created and owned by the Supabase Portainer stack. Deploy the Supabase
# stack first and ensure it is healthy before deploying this stack.
#
# The console connects to Supabase services by their internal container names:
#   supabase-db   → PostgreSQL 15 on port 5432 (direct DB connection)
#   supabase-kong → Kong API gateway on port 8000 (REST / Storage / Auth)
#
# GHCR authentication
# ───────────────────
# If the repository is private, Portainer needs a registry credential:
#   Portainer → Registries → Add Registry → GitHub Container Registry
#   Username: your GitHub username
#   Password: a GitHub PAT with packages:read scope
#
# Environment variables
# ─────────────────────
# Set the REQUIRED variables in Portainer UI:
#   Stacks → <this stack> → Environment variables
#
# =============================================================================

version: "3.9"

services:
  # ── TTRPG OCR Console ──────────────────────────────────────────────────────
  # Pre-built image from GHCR. No build step required on the host.
  # On startup the container runs:
  #   1. node migrate.mjs  — applies any pending Drizzle SQL migrations
  #   2. node dist/index.js — starts the Express + tRPC server
  console:
    image: ghcr.io/pakgrou-porg/ttrpg-ocr-console:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    networks:
      - supabase_net
    # Allows the container to reach host-machine services (e.g. local LLM servers)
    # using the hostname "host.docker.internal". Required on Linux Docker.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${PIPELINE_WORKSPACE_HOST:-/opt/ttrpg-workspace}:/app/workspace
    environment:
      NODE_ENV: production
      PORT: "3000"

      # ── Database ────────────────────────────────────────────────────────────
      # Direct PostgreSQL connection to the Supabase db container.
      # Uses the internal Docker network hostname "supabase-db".
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/postgres?sslmode=disable

      # ── Secrets ─────────────────────────────────────────────────────────────
      # Generate with: openssl rand -base64 32
      JWT_SECRET: ${JWT_SECRET}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}

      # ── Manus OAuth ─────────────────────────────────────────────────────────
      VITE_APP_ID: ${VITE_APP_ID}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-https://api.manus.im}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL:-https://manus.im}

      # ── Owner bootstrap ─────────────────────────────────────────────────────
      # The user whose open_id matches OWNER_OPEN_ID is automatically promoted
      # to admin on first login. Set once; safe to leave in place afterwards.
      OWNER_OPEN_ID: ${OWNER_OPEN_ID}
      OWNER_NAME: ${OWNER_NAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}

      # ── Supabase REST / Storage / Auth (via Kong gateway) ───────────────────
      # Uses the internal Docker network hostname "supabase-kong".
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}

      # ── Google Drive integration (optional) ─────────────────────────────────
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}

      # ── Public app URL (required for Google OAuth redirect URI) ─────────────
      APP_URL: ${APP_URL:-http://localhost:3000}

      # ── Pipeline workspace (mounted volume path inside container) ───────────
      PIPELINE_WORKSPACE: /app/workspace

      # ── Manus built-in AI APIs (optional — leave blank for self-hosted) ─────
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:-}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY:-}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL:-}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY:-}

      # ── Branding (optional) ─────────────────────────────────────────────────
      VITE_APP_TITLE: ${VITE_APP_TITLE:-TTRPG OCR Console}
      VITE_APP_LOGO: ${VITE_APP_LOGO:-}

      # ── Analytics (optional) ────────────────────────────────────────────────
      VITE_ANALYTICS_ENDPOINT: ${VITE_ANALYTICS_ENDPOINT:-}
      VITE_ANALYTICS_WEBSITE_ID: ${VITE_ANALYTICS_WEBSITE_ID:-}

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/trpc/health.ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  # Joins the external network created by the Supabase stack.
  # The Supabase stack must be deployed first.
  supabase_net:
    external: true
    name: supabase_net

# =============================================================================
# Environment variables to set in Portainer UI
# (Stacks → <this stack> → Environment variables):
#
# REQUIRED:
#   POSTGRES_PASSWORD         Password for the Supabase postgres user
#   JWT_SECRET                openssl rand -base64 32
#   CREDENTIAL_ENCRYPTION_KEY openssl rand -base64 32  (separate from JWT_SECRET)
#   VITE_APP_ID               Manus application ID (from Manus project settings)
#   OWNER_OPEN_ID             Your Manus user open-id (grants admin on first login)
#   OWNER_NAME                Your display name
#   ANON_KEY                  Supabase anon JWT (from Supabase stack env)
#   SERVICE_ROLE_KEY          Supabase service role JWT (from Supabase stack env)
#
# OPTIONAL (defaults shown):
#   IMAGE_TAG                 latest  (pin to semver e.g. "0.2.30" for stability)
#   HOST_PORT                 3000
#   APP_URL                   http://localhost:3000  (set to public URL for Google OAuth)
#   ADMIN_EMAIL               (email auto-promoted to admin on every login)
#   PIPELINE_WORKSPACE_HOST   /opt/ttrpg-workspace  (host path mounted as /app/workspace)
#   GOOGLE_CLIENT_ID          (required for Google Drive integration)
#   GOOGLE_CLIENT_SECRET      (required for Google Drive integration)
#   GOOGLE_API_KEY            (required for Drive file picker)
#   OAUTH_SERVER_URL          https://api.manus.im
#   VITE_OAUTH_PORTAL_URL     https://manus.im
#   VITE_APP_TITLE            TTRPG OCR Console
#   BUILT_IN_FORGE_API_URL    (leave blank if not using Manus-hosted LLM APIs)
#   BUILT_IN_FORGE_API_KEY    (leave blank if not using Manus-hosted LLM APIs)
#   VITE_FRONTEND_FORGE_API_URL
#   VITE_FRONTEND_FORGE_API_KEY
#
# LOCAL LLM SERVERS (e.g. LM Studio on the host machine):
#   Use "host.docker.internal" as the Base URL when registering an Artificer.
#   The extra_hosts entry above maps this hostname to the Docker host gateway
#   so the container can reach services running directly on the Linux host.
# =============================================================================
