# ─── TTRPG OCR Console — Portainer Stack ─────────────────────────────────────
#
# Usage (Portainer):
#   1. In Portainer → Stacks → Add Stack → "Repository" tab
#   2. Set the Git URL to your fork of this repo
#   3. Set the Compose path to "docker-compose.yml"
#   4. Fill in the "Environment variables" section (see below)
#   5. Click "Deploy the stack"
#
# Usage (CLI):
#   cp .env.example .env   # then edit .env
#   docker compose up -d
#
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── MySQL / TiDB-compatible database ──────────────────────────────────────
  # The console uses Drizzle ORM with a MySQL dialect.
  # For local testing a plain MySQL 8 container is sufficient.
  # Replace with your existing TiDB / PlanetScale / Aiven connection string
  # by removing this service and setting DATABASE_URL directly.
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ttrpg_ocr}
      MYSQL_USER: ${MYSQL_USER:-ocr_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-changeme}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ocr_net

  # ── TTRPG OCR Console (Node.js / Express + React) ─────────────────────────
  console:
    # Option A: Build from local source (default for development)
    build:
      context: .
      dockerfile: Dockerfile

    # Option B: Pull a pre-built image from GitHub Container Registry
    # Uncomment the line below and comment out the "build:" block above
    # image: ghcr.io/pakgrou-porg/ttrpg-ocr-console:latest

    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000

      # ── Required: Database ──────────────────────────────────────────────
      # Format: mysql://USER:PASSWORD@HOST:PORT/DATABASE
      DATABASE_URL: mysql://${MYSQL_USER:-ocr_user}:${MYSQL_PASSWORD:-changeme}@db:3306/${MYSQL_DATABASE:-ttrpg_ocr}

      # ── Required: Session & Encryption secrets ──────────────────────────
      # Generate with: openssl rand -base64 32
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}

      # ── Required: Manus OAuth (copy from your Manus project settings) ───
      VITE_APP_ID: ${VITE_APP_ID:-}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-https://api.manus.im}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL:-https://manus.im}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID:-}
      OWNER_NAME: ${OWNER_NAME:-}

      # ── Optional: Manus built-in AI APIs ────────────────────────────────
      # Leave blank if you are not using the built-in LLM / image generation
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:-}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY:-}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL:-}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY:-}

      # ── Optional: Branding ───────────────────────────────────────────────
      VITE_APP_TITLE: ${VITE_APP_TITLE:-TTRPG OCR Console}
      VITE_APP_LOGO: ${VITE_APP_LOGO:-}

      # ── Optional: Analytics ─────────────────────────────────────────────
      VITE_ANALYTICS_ENDPOINT: ${VITE_ANALYTICS_ENDPOINT:-}
      VITE_ANALYTICS_WEBSITE_ID: ${VITE_ANALYTICS_WEBSITE_ID:-}

    networks:
      - ocr_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/trpc/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  db_data:
    driver: local

networks:
  ocr_net:
    driver: bridge
