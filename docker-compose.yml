# ─── TTRPG OCR Console — Portainer Stack ─────────────────────────────────────
#
# This stack connects to an EXTERNAL Supabase stack rather than bundling its own
# database. The Supabase stack must be running and reachable before deploying.
#
# ── Connecting to your Supabase stack ─────────────────────────────────────────
#
# Option A — Shared Docker network (recommended for Portainer):
#   1. Add a named network to your Supabase docker-compose.yml:
#        networks:
#          supabase_net:
#            name: supabase_net
#            driver: bridge
#      And attach every Supabase service to it:
#        networks:
#          - supabase_net
#   2. Set DATABASE_URL below using the Supabase DB container name:
#        DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
#
# Option B — Host-exposed port (simpler, no network config needed):
#   The supabase/postgres image exposes port 5432 on the host.
#   From inside a Docker container, reach the host via host.docker.internal (Docker Desktop)
#   or the host machine's IP (native Linux Docker).
#        DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@host.docker.internal:5432/postgres
#
# Usage (Portainer):
#   1. In Portainer → Stacks → Add Stack → "Repository" tab
#   2. Set the Git URL to your fork of this repo
#   3. Set the Compose path to "docker-compose.yml"
#   4. Fill in the "Environment variables" section (see below)
#   5. Click "Deploy the stack"
#
# Usage (CLI):
#   cp .env.example .env   # then edit .env
#   docker compose up -d
#
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── TTRPG OCR Console (Node.js / Express + React) ─────────────────────────
  console:
    # Option A: Build from local source (default for development)
    build:
      context: .
      dockerfile: Dockerfile

    # Option B: Pull a pre-built image from GitHub Container Registry
    # Uncomment the line below and comment out the "build:" block above
    # image: ghcr.io/pakgrou-porg/ttrpg-ocr-console:latest

    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000

      # ── Required: Supabase database connection ──────────────────────────
      # Format: postgresql://USER:PASSWORD@HOST:PORT/DATABASE
      # See network options at the top of this file.
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}

      # ── Optional: Supabase REST API (Kong gateway) ──────────────────────
      # Used for storage, realtime, and future edge function calls.
      # Local:  http://supabase-kong:8000  (shared network) or http://localhost:8100 (host port)
      # Cloud:  https://<project-ref>.supabase.co
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}

      # ── Required: Session & Encryption secrets ──────────────────────────
      # Generate with: openssl rand -base64 32
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}

      # ── Required: Manus OAuth (copy from your Manus project settings) ───
      VITE_APP_ID: ${VITE_APP_ID:-}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-https://api.manus.im}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL:-https://manus.im}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID:-}
      OWNER_NAME: ${OWNER_NAME:-}

      # ── Optional: Manus built-in AI APIs ────────────────────────────────
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:-}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY:-}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL:-}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY:-}

      # ── Optional: Branding ───────────────────────────────────────────────
      VITE_APP_TITLE: ${VITE_APP_TITLE:-TTRPG OCR Console}
      VITE_APP_LOGO: ${VITE_APP_LOGO:-}

      # ── Optional: Analytics ─────────────────────────────────────────────
      VITE_ANALYTICS_ENDPOINT: ${VITE_ANALYTICS_ENDPOINT:-}
      VITE_ANALYTICS_WEBSITE_ID: ${VITE_ANALYTICS_WEBSITE_ID:-}

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/trpc/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    # ── Network: uncomment and set name to match your Supabase network ────
    # networks:
    #   - supabase_net

# ── External network (Option A — shared Supabase network) ─────────────────
# Uncomment if you added supabase_net to your Supabase docker-compose.yml
# networks:
#   supabase_net:
#     external: true
#     name: supabase_net
